<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Скоринг проекта → deep-research</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="brand">
          <span class="brand__mark"></span>
          <div>
            <div class="brand__title">Скоринг проекта</div>
            <div class="brand__sub">Опросник V0 → готовый deep-research метапромт</div>
          </div>
        </div>
        <div class="toolbar">
          <button id="btn-export" class="btn btn--ghost" type="button">Экспорт</button>
          <button id="btn-import" class="btn btn--ghost" type="button">Импорт</button>
          <button id="btn-reset" class="btn btn--ghost" type="button">Сбросить</button>
          <input id="file-import" type="file" accept="application/json" hidden />
        </div>
      </div>
      <div class="progress"><div id="progress-bar" class="progress__bar"></div></div>
    </header>

    <main id="app" class="app"></main>

    <footer class="footer">
      Данные хранятся только в этом браузере (localStorage). Рассылка по моделям — в Фазе 2.
    </footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
