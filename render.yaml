# Render Blueprint — деплой бэкенда рассылки в пару кликов.
# Render → New → Blueprint → выбрать репозиторий TuzovGleb/mts-scoring.
# Ключи впишешь в дашборде Render (sync:false → в репозиторий не попадают).
services:
  - type: web
    name: mts-scoring-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      # CORS на сайт GitHub Pages
      - key: ALLOWED_ORIGINS
        value: https://tuzovgleb.github.io
      # --- Parallel.ai ---
      - key: PARALLEL_API_KEY
        sync: false # ввести вручную в дашборде Render
      - key: PARALLEL_PROCESSOR
        value: ultra
      # --- OpenAI (ChatGPT) ---
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.1
      # --- опционально: добавишь позже ---
      # - key: GEMINI_API_KEY
      #   sync: false
      # - key: ANTHROPIC_API_KEY
      #   sync: false
