# Render Blueprint — деплой бэкенда рассылки в пару кликов.
# Render → New → Blueprint → выбрать репозиторий TuzovGleb/mts-scoring.
# Ключ ANTHROPIC_API_KEY впишешь в дашборде (sync:false → в репо не хранится).
services:
  - type: web
    name: mts-scoring-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false # ввести вручную в дашборде Render
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: ALLOWED_ORIGINS
        value: https://tuzovgleb.github.io
      # Ключи остальных провайдеров можно добавить позже — без них они в мок-режиме:
      # - key: PERPLEXITY_API_KEY
      #   sync: false
      # - key: OPENAI_API_KEY
      #   sync: false
      # - key: GEMINI_API_KEY
      #   sync: false
